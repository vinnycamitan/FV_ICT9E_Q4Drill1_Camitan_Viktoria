<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q4 Drill 1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="text-center mt-5">

<h1>Electricity Consumption Classifier</h1>


<!-- input -->
<input type="text" id="consumption" class="form-control w-25 mx-auto" placeholder="Input kilowatt per hour">

<br>

<button class="btn btn-info" onclick="classifyConsumption()">Consumption Classification</button>

<script>


function classifyConsumption(){

var consumption = document.getElementById("consumption").value

if(isNaN(consumption) || consumption < 0){
alert("Please input a valid number.")
}

// conditions
else if(consumption <= 100){
alert("Very Low")
}

else if(consumption < 200){
alert("Low")
}

else if(consumption < 300){
alert("Average")
}

else if(consumption > 500){
alert("High")
}

else{
alert("Very High")
}

}

</script>

</body>
</html>
